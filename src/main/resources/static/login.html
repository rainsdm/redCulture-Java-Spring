<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 - 红色文化学习打卡系统</title>
    <link rel="stylesheet" href="css/bootstrap@5.3.7.css"> <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background-color: #f8f9fa; /* 设置一个柔和的背景色 */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-8 col-lg-6 col-xl-5">

                <div class="card shadow-lg border-0">
                    <div class="card-body p-4 p-md-5 text-center">
                        <i class="bi bi-flag-fill text-danger" style="font-size: 3rem;"></i>
                        <h3 class="fw-bold my-3">用户登录</h3>

                        <form>
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="loginUsername" placeholder="用户名" required>
                                <label for="loginUsername"><i class="bi bi-person-fill"></i> 用户名</label>
                            </div>
                            <div class="form-floating mb-4">
                                <input type="password" class="form-control" id="loginPassword" placeholder="密码" required>
                                <label for="loginPassword"><i class="bi bi-lock-fill"></i> 密码</label>
                            </div>
                            <div class="d-grid">
                                <button class="btn btn-danger btn-lg" type="submit">登 录</button>
                            </div>
                        </form>

                        <div class="mt-4">
                            <a href="register.html">还没有账户？立即注册</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
