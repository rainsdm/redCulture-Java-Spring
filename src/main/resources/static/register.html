<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>注册 - 红色文化学习打卡系统</title>
    <link rel="stylesheet" href="css/bootstrap@5.3.7.css"> <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-8 col-lg-6 col-xl-5">

                <div class="card shadow-lg border-0">
                    <div class="card-body p-4 p-md-5 text-center">
                        <i class="bi bi-flag-fill text-danger" style="font-size: 3rem;"></i>
                        <h3 class="fw-bold my-3">创建新账户</h3>

                        <form>
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="registerUsername" placeholder="设置用户名" required>
                                <label for="registerUsername"><i class="bi bi-person-plus-fill"></i> 设置用户名</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="password" class="form-control" id="registerPassword" placeholder="设置密码" required>
                                <label for="registerPassword"><i class="bi bi-lock-fill"></i> 设置密码</label>
                            </div>
                            <div class="form-floating mb-4">
                                <input type="password" class="form-control" id="confirmPassword" placeholder="确认密码" required>
                                <label for="confirmPassword"><i class="bi bi-shield-lock-fill"></i> 确认密码</label>
                            </div>
                            <div class="d-grid">
                                <button class="btn btn-danger btn-lg" type="submit">立即注册</button>
                            </div>
                        </form>

                        <div class="mt-4">
                            <a href="login.html">已经有账户了？返回登录</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
